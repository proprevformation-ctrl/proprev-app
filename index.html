<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1B3A6B;--orange:#E87722;--green:#1D7044;--red:#C00000;--purple:#5B2C8D;--teal:#0D6E6E;--bg:#F5F5F5;--card:#fff;--border:#E0E0E0;--text:#1A1A1A;--muted:#666;--light:#F0F0F0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;min-height:100vh}
/* HEADER */
.header{background:var(--blue);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-brand{font-size:16px;font-weight:600;letter-spacing:.5px}
.header-brand span{color:var(--orange)}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px 5px 6px;cursor:pointer;font-size:13px;transition:.2s}
.user-chip:hover{background:rgba(255,255,255,.25)}
/* NAV */
.nav{display:flex;background:#152e56;border-top:1px solid rgba(255,255,255,.1)}
.nav-btn{flex:1;padding:10px 4px 8px;color:rgba(255,255,255,.55);font-size:11px;text-align:center;cursor:pointer;border:none;background:none;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.nav-btn:hover{color:rgba(255,255,255,.85)}
.nav-btn.active{color:var(--orange);border-bottom:2px solid var(--orange)}
.nav-icon{font-size:18px;line-height:1}
/* CONTENT */
.content{flex:1;padding:12px;max-width:600px;margin:0 auto;width:100%}
/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:30px 16px}
.login-logo{text-align:center}
.login-logo h1{font-size:24px;color:var(--blue);font-weight:700}
.login-logo p{font-size:13px;color:var(--muted);margin-top:4px}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px}
.user-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px 10px;cursor:pointer;text-align:center;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.user-card:hover{border-color:var(--blue);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.user-card.admin-card{border-color:var(--orange);background:#FFF8F4}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600}
.user-card-name{font-size:13px;font-weight:600;color:var(--text)}
.user-card-role{font-size:11px;color:var(--muted);line-height:1.3}
/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-sm{padding:10px 12px}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-urgent{background:#FDECEA;color:#C00000}
.b-important{background:#FEF0E6;color:#884000}
.b-normal{background:#EBF5E8;color:#2E6B1A}
.b-proprev{background:#E3EEF9;color:#0D3D7C}
.b-cfa{background:#EEF0FE;color:#3830A8}
.b-todo{background:#F0F0F0;color:#555}
.b-inprogress{background:#FEF0E6;color:#884000}
.b-done{background:#EBF5E8;color:#2E6B1A}
.b-blocked{background:#FDECEA;color:#C00000}
/* TASKS */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;border-left:4px solid var(--border)}
.task-card.urgent{border-left-color:var(--red)}
.task-card.important{border-left-color:var(--orange)}
.task-card.normal{border-left-color:var(--green)}
.task-card.done-card{opacity:.6;border-left-color:#ccc}
.task-title{font-size:14px;font-weight:600;margin:6px 0 4px;color:var(--text)}
.task-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.task-client{font-weight:600;color:var(--blue)}
.task-notes{font-size:12px;color:var(--muted);font-style:italic;margin:4px 0}
.procedure-box{background:#F8F9FA;border-radius:8px;padding:10px;font-size:12px;color:#444;white-space:pre-line;line-height:1.7;display:none;margin-top:8px;border-left:3px solid var(--blue)}
.procedure-box.open{display:block}
.task-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
/* ALERTS */
.alert-card{border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:4px solid}
.alert-critical{background:#FDECEA;border-color:#E53935}
.alert-important{background:#FEF0E6;border-color:var(--orange)}
.alert-watch{background:#FFFDE7;border-color:#F9A825}
.alert-title{font-size:13px;font-weight:600;margin-bottom:2px}
.alert-detail{font-size:12px;color:var(--muted)}
.alert-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
/* BUTTONS */
.btn{border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;background:var(--card);color:var(--text);transition:.2s;font-family:inherit}
.btn:hover{background:var(--light)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#2E5FA3}
.btn-orange{background:var(--orange);color:#fff;border-color:var(--orange)}
.btn-orange:hover{background:#c96210}
.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-block{width:100%;display:block;text-align:center}
/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:700}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:400px}
.chat-messages{flex:1;overflow-y:auto;padding-bottom:10px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6}
.msg-user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-ai{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px;color:var(--text)}
.msg-thinking{color:var(--muted);font-style:italic;font-size:12px;align-self:flex-start}
.chat-input-row{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border);margin-top:8px}
.chat-input{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;resize:none;height:46px;font-family:inherit;background:var(--card);color:var(--text)}
.chat-input:focus{outline:none;border-color:var(--blue)}
/* FORM */
.form-group{margin-bottom:12px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block}
.form-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;background:var(--card);color:var(--text);font-family:inherit}
.form-input:focus{outline:none;border-color:var(--blue)}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:500}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
/* LOG */
.log-item{display:flex;gap:10px;font-size:12px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--light)}
.log-time{min-width:45px;color:#999}
.log-item:last-child{border-bottom:none}
/* TEAM VIEW */
.team-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.team-count{font-size:22px;font-weight:700;min-width:32px;text-align:right}
/* MISC */
.empty{text-align:center;padding:36px 16px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:8px}
.divider{height:1px;background:var(--border);margin:12px 0}
.badge-count{background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:700;margin-left:4px}
.success-msg{background:#EBF5E8;color:#2E6B1A;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;font-weight:500}
.error-msg{background:#FDECEA;color:#C00000;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;font-weight:500}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.passation-card{background:#FFF8F4;border:1px solid #FFCC99;border-radius:10px;padding:14px;margin-bottom:8px}
</style>

async function initDB() {
  const snap = await db.collection("tasks").limit(1).get();
  if (snap.empty) {
    const batch = db.batch();
    INIT_TASKS.forEach(t => batch.set(db.collection("tasks").doc(t.id), {...t, createdAt: firebase.firestore.FieldValue.serverTimestamp()}));
    INIT_ALERTS.forEach(a => batch.set(db.collection("alerts").doc(a.id), a));
    await batch.commit();
  }
}

    render();
  });
  unsubAlerts = db.collection("alerts").onSnapshot(snap => {
    alerts = snap.docs.map(d => ({id: d.id, ...d.data()}));
    render();
  });
  unsubLog = db.collection("activity_log").orderBy("createdAt","desc").limit(50).onSnapshot(snap => {
    activityLog = snap.docs.map(d => d.data());
    render();
  });
}

async function updateTask(id, data) {
  await db.collection("tasks").doc(id).update(data);
}

async function addTaskDB(task) {
  const ref = db.collection("tasks").doc();
  await ref.set({...task, id: ref.id, createdAt: firebase.firestore.FieldValue.serverTimestamp()});
  return ref.id;
}

async function updateAlert(id, data) {
  await db.collection("alerts").doc(id).update(data);
}

async function addLog(msg) {
  await db.collection("activity_log").add({
    msg, user: currentUser?.name || "Système",
    time: new Date().toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"}),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

// ═══════════════════════════════════════════════════
// CLAUDE API
// ═══════════════════════════════════════════════════
async function callClaude(msg) {
  const sys = SYSTEM_PROMPTS[currentUser?.id] || SYSTEM_PROMPTS.aya;
  const messages = [...chatHistory, {role:"user", content:msg}];
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:1000, system:sys, messages})
  });
  const data = await res.json();
  return data.content?.[0]?.text || "Erreur de réponse.";
}

function renderTaskCard(task, showAssignee=false, isDoneCard=false) {
  const u = USERS[task.assignedTo] || {name:task.assignedTo,color:"#888"};
  const isOwn = currentUser && (task.assignedTo===currentUser.id || currentUser.admin);
  const cl = isDoneCard ? "done-card" : (task.priority||"normal");
  return `<div class="task-card ${cl}" id="tc-${task.id}">

      ${pBadge(task.priority)}
      <span class="badge b-${task.category.toLowerCase()}">${task.category}</span>
      ${sBadge(task.status)}
    </div>
    <div class="task-title">${task.title}</div>
    <div class="task-meta">
      <span class="task-client">${task.client||""}</span>
      ${task.deadline?`<span>→ ${task.deadline}</span>`:""}
      ${showAssignee?`<span style="display:flex;align-items:center;gap:4px">${avatarHTML(u,16)} ${u.name}</span>`:""}
    </div>
    ${task.notes?`<div class="task-notes">${task.notes}</div>`:""}
    ${task.procedure?`<button class="btn btn-sm" onclick="toggleProc('${task.id}')" style="margin-top:6px">Voir la procédure</button>
    <div class="procedure-box" id="pb-${task.id}">${task.procedure}</div>`:""}
    ${isOwn && !isDoneCard?`<div class="task-actions">
      ${task.status==="todo"?`<button class="btn btn-sm btn-primary" onclick="changeStatus('${task.id}','inprogress')">Démarrer</button>`:""}
      ${task.status==="inprogress"?`<button class="btn btn-sm btn-green" onclick="changeStatus('${task.id}','done')">Marquer terminé</button>`:""}
      ${task.status!=="blocked"?`<button class="btn btn-sm" style="color:#C00000;border-color:#C00000" onclick="changeStatus('${task.id}','blocked')">Signaler bloqué</button>`:""}
      ${task.status==="blocked"?`<button class="btn btn-sm" onclick="changeStatus('${task.id}','todo')">Débloquer</button>`:""}
    </div>`:""}
  </div>`;
}

function renderAlertCard(a) {
  if (a.status === "done") return "";
  const isOwn = currentUser && (a.assignedTo===currentUser.id || currentUser.admin);
  const cl = a.level==="critical"?"alert-critical":a.level==="important"?"alert-important":"alert-watch";
  const icon = a.level==="critical"?"🔴":"a.level==="important"?"🟠":"🟡";
  return `<div class="alert-card ${cl}">
    <div class="alert-title">${a.level==="critical"?"🔴":a.level==="important"?"🟠":"🟡"} ${a.client} — ${a.problem}</div>
    <div class="alert-detail">${a.detail}</div>
    <div class="alert-footer">
      <span style="font-size:11px;color:#777">→ ${USERS[a.assignedTo]?.name||a.assignedTo} · Échéance : ${a.deadline}</span>
      ${isOwn?`<button class="btn btn-sm" onclick="resolveAlert('${a.id}')">Résolu ✓</button>`:""}
    </div>
  </div>`;
}

async function login(userId) {
  currentUser = USERS[userId];
  chatHistory = [];
  currentTab = "dashboard";
  taskFilter = "my";
  taskCat = "all";
  await addLog(`${currentUser.name} s'est connecté(e)`);
  subscribeAll();
  loadPassations();
  render();
}

function logout() {
  currentUser = null;
  if (unsubTasks) unsubTasks();
  if (unsubAlerts) unsubAlerts();
  if (unsubLog) unsubLog();
  chatHistory = [];
  render();
}

function setTab(tab) { currentTab = tab; render(); if(tab==="chat")setTimeout(scrollChat,100); if(tab==="passation")loadPassations(); }
function setTaskFilter(f) { taskFilter = f; render(); }
function setTaskCat(c) { taskCat = c; render(); }
function toggleProc(id) { document.getElementById("pb-"+id)?.classList.toggle("open"); }

async function changeStatus(taskId, status) {
  const task = tasks.find(t=>t.id===taskId);
  if (!task) return;
  await updateTask(taskId, {status});
  await addLog(`${currentUser.name} → ${task.title.slice(0,40)} : ${status}`);
}

async function resolveAlert(alertId) {
  const a = alerts.find(x=>x.id===alertId);
  await updateAlert(alertId, {status:"done"});
  await addLog(`${currentUser.name} a résolu l'alerte : ${a?.problem||""}`);
}

async function dispatchTask() {
  const title = document.getElementById("d-title")?.value.trim();
  if (!title) { dispatchMsg = "⚠️ Le titre est obligatoire."; render(); return; }
  const task = {
    title,
    assignedTo: document.getElementById("d-assign")?.value,
    priority: document.getElementById("d-prio")?.value,
    category: document.getElementById("d-cat")?.value,
    client: document.getElementById("d-client")?.value || "",
    deadline: document.getElementById("d-deadline")?.value || "",
    notes: document.getElementById("d-notes")?.value || "",
    procedure: document.getElementById("d-proc")?.value || "",
    validatedByEmir: true,
    status: "todo",
  };
  await addTaskDB(task);
  await addLog(`Emir a assigné "${title}" à ${USERS[task.assignedTo]?.name}`);
  dispatchMsg = `✅ Tâche assignée à ${USERS[task.assignedTo]?.name} !`;
  render();
  setTimeout(() => { dispatchMsg = ""; render(); }, 4000);
}

async function sendChat() {
  const inp = document.getElementById("chat-in");
  if (!inp || !inp.value.trim()) return;
  const msg = inp.value.trim();
  inp.value = "";
  chatHistory.push({role:"user", content:msg});
  render();
  scrollChat();
  const el = document.getElementById("chat-msgs");
  if (el) { const t = document.createElement("div"); t.className="msg msg-thinking"; t.textContent="Réflexion en cours..."; el.appendChild(t); el.scrollTop=el.scrollHeight; }
  try {
    const resp = await callClaude(msg);
    chatHistory.push({role:"assistant", content:resp});
    render();
    scrollChat();
  } catch(e) {
    chatHistory.push({role:"assistant", content:"Erreur de connexion à Claude. Réessaie dans un moment."});
    render();
  }
}

function scrollChat() { const el=document.getElementById("chat-msgs"); if(el)el.scrollTop=el.scrollHeight; }

async function addPassation() {
  const info = document.getElementById("p-info")?.value.trim();
  if (!info) return;
  const from = document.getElementById("p-from")?.value;
  const dossier = document.getElementById("p-dossier")?.value||"";
  const urgent = document.getElementById("p-urgent")?.value==="oui";
  await db.collection("passations").add({
    from: USERS[from]?.name || from,
    info, dossier, urgent,
    time: new Date().toLocaleString("fr-FR",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit"}),
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    status: "en attente"
  });
  document.getElementById("p-info").value="";
  document.getElementById("p-dossier").value="";
  await addLog(`${currentUser.name} a ajouté une passation`);
  loadPassations();
}

async function loadPassations() {
  const el = document.getElementById("passation-list");
  if (!el) return;
  const snap = await db.collection("passations").orderBy("createdAt","desc").limit(20).get();
  if (snap.empty) { el.innerHTML=`<div class="empty">Aucune passation enregistrée</div>`; return; }
  el.innerHTML = snap.docs.map(d=>{
    const p=d.data();
    return `<div class="passation-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-weight:600;font-size:13px">${p.from} → équipe</span>
        <span style="font-size:11px;color:#777">${p.time}</span>
      </div>
      ${p.urgent?`<span class="badge b-urgent" style="margin-bottom:6px">🔴 URGENT</span>`:""}
      <div style="font-size:13px">${p.info}</div>
      ${p.dossier?`<div style="font-size:11px;color:#666;margin-top:4px">Dossier : ${p.dossier}</div>`:""}
    </div>`;
  }).join("");
}

  const pages = {dashboard:renderDashboard, tasks:renderTasks, alerts:renderAlerts, chat:renderChat, admin:renderAdmin, passation:renderPassation};

  app.innerHTML = `
    <div class="header">
      <div class="header-brand">PROPREV <span>●</span> Équipe</div>
      <div class="user-chip" onclick="logout()">
        ${avatarHTML(currentUser, 26)}
        <span>${currentUser.name}</span>
        <span style="opacity:.6;font-size:12px">↩</span>
      </div>
    </div>
    <div class="nav">
      ${navItems.map(n=>`<button class="nav-btn ${currentTab===n.id?"active":""}" onclick="setTab('${n.id}')">
        <span class="nav-icon">${n.icon}</span>
        <span>${n.label}${n.count?`<span class="badge-count">${n.count}</span>`:""}</span>
      </button>`).join("")}
    </div>
    <div class="content">${content}</div>`;

  if (currentTab==="chat") scrollChat();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.login=login; window.logout=logout; window.setTab=setTab;
window.setTaskFilter=setTaskFilter; window.setTaskCat=setTaskCat;
window.toggleProc=toggleProc; window.changeStatus=changeStatus;
window.resolveAlert=resolveAlert; window.dispatchTask=dispatchTask;
window.sendChat=sendChat; window.addPassation=addPassation;

initDB().then(()=>{
  render();
  document.getElementById("app").innerHTML=renderLogin();
}).catch(e=>{
  document.getElementById("app").innerHTML=`<div class="error-msg" style="margin:20px">Erreur Firebase : ${e.message}<br><br>Vérifie ta configuration Firebase dans index.html</div>`;
});
</script>
</body>
</html>
