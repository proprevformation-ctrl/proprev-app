// DB Operations
async function saveTask(task) {
  if (!db) return;
  try { await db.collection("tasks").doc(task.id).set(task); } catch(e) { console.error(e); }
}

async function updateTaskDB(id, data) {
  if (!db) { tasks = tasks.map(t => t.id===id ? {...t,...data} : t); render(); return; }
  try { await db.collection("tasks").doc(id).update(data); } catch(e) { console.error(e); }
}

async function addTaskDB(task) {
  const id = "t" + Date.now();
  const newTask = {...task, id, createdAt: new Date().toISOString(), status:"todo"};
  tasks = [newTask, ...tasks];
  if (db) { try { await db.collection("tasks").doc(id).set(newTask); } catch(e) {} }
  render();
  return id;
}

async function updateAlertDB(id, data) {
  alerts = alerts.map(a => a.id===id ? {...a,...data} : a);
  if (db) { try { await db.collection("alerts").doc(id).update(data); } catch(e) {} }
  render();
}

async function addLogDB(msg) {
  const entry = {time: new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}), msg, user: currentUser?.name||"Système"};
  activityLog = [entry, ...activityLog.slice(0,49)];
  if (db) { try { await db.collection("activity_log").add({...entry, createdAt: firebase.firestore.FieldValue.serverTimestamp()}); } catch(e) {} }
}

function subscribeFirestore() {
  if (!db) return;
  unsubTasks = db.collection("tasks").onSnapshot(snap => {
    if (!snap.empty) { tasks = snap.docs.map(d => ({...d.data(), id:d.id})); render(); }
  }, e => console.error("Tasks subscription error:", e));
  unsubAlerts = db.collection("alerts").onSnapshot(snap => {
    if (!snap.empty) { alerts = snap.docs.map(d => ({...d.data(), id:d.id})); render(); }
  }, e => console.error("Alerts subscription error:", e));
  db.collection("activity_log").orderBy("createdAt","desc").limit(20).onSnapshot(snap => {
    if (!snap.empty) { activityLog = snap.docs.map(d => d.data()); }
  }, e => {});
}

async function initFirestoreData() {
  if (!db) return;
  try {
    const snap = await db.collection("tasks").limit(1).get();
    if (snap.empty) {
      const batch = db.batch();
      INIT_TASKS.forEach(t => batch.set(db.collection("tasks").doc(t.id), t));
      INIT_ALERTS.forEach(a => batch.set(db.collection("alerts").doc(a.id), a));
      await batch.commit();
    }
  } catch(e) { console.error("Init data error:", e); }
}

    <div class="login-grid">
      ${Object.values(USERS).map(u=>`
        <div class="user-card ${u.admin?"admin-card":""}" onclick="login('${u.id}')">
          ${avatarHTML(u,44)}
          <div style="font-size:13px;font-weight:600">${u.name}</div>
          <div style="font-size:11px;color:#666">${u.role.split("·")[0].trim()}</div>
        </div>`).join("")}
    </div>
    <div style="font-size:11px;color:#999;text-align:center">Tâches synchronisées en temps réel</div>
  </div>`;
}

function renderTaskCard(task, showAssignee=false, done=false) {
  const u = USERS[task.assignedTo]||{name:task.assignedTo,color:"#888"};
  const isOwn = currentUser&&(task.assignedTo===currentUser.id||currentUser.admin);
  return `<div class="task-card ${done?"":task.priority}">
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">
      ${pBadge(task.priority)}
      <span class="badge b-${(task.category||"proprev").toLowerCase()}">${task.category}</span>
      ${sBadge(task.status)}
    </div>
    <div class="task-title">${task.title}</div>
    <div class="task-meta">
      <span class="task-client">${task.client||""}</span>
      ${task.deadline?`<span>→ ${task.deadline}</span>`:""}
      ${showAssignee?`<span>${u.name}</span>`:""}
    </div>
    ${task.notes?`<div class="task-notes">${task.notes}</div>`:""}
    ${task.procedure?`<button class="btn btn-sm" onclick="toggleProc('${task.id}')" style="margin-top:6px">Voir procédure</button>
    <div class="procedure-box" id="pb-${task.id}">${task.procedure}</div>`:""}
    ${isOwn&&!done?`<div class="task-actions">
      ${task.status==="todo"?`<button class="btn btn-sm btn-primary" onclick="chStatus('${task.id}','inprogress')">Démarrer</button>`:""}
      ${task.status==="inprogress"?`<button class="btn btn-sm btn-green" onclick="chStatus('${task.id}','done')">Terminé ✓</button>`:""}
      ${task.status!=="blocked"?`<button class="btn btn-sm" style="color:#C00000;border-color:#C00000" onclick="chStatus('${task.id}','blocked')">Bloqué</button>`:""}
      ${task.status==="blocked"?`<button class="btn btn-sm" onclick="chStatus('${task.id}','todo')">Débloquer</button>`:""}
    </div>`:""}
  </div>`;
}

function renderAlertCard(a) {
  if (a.status==="done") return "";
  const isOwn = currentUser&&(a.assignedTo===currentUser.id||currentUser.admin);
  const cl = a.level==="critical"?"alert-critical":"alert-important";
  return `<div class="alert-card ${cl}">
    <div class="alert-title">${a.level==="critical"?"🔴":"🟠"} ${a.client} — ${a.problem}</div>
    <div class="alert-detail">${a.detail}</div>
    <div class="alert-footer">
      <span style="font-size:11px;color:#777">→ ${USERS[a.assignedTo]?.name||a.assignedTo} · ${a.deadline}</span>
      ${isOwn?`<button class="btn btn-sm" onclick="resolveAlert('${a.id}')">Résolu ✓</button>`:""}
    </div>
  </div>`;
}

function renderDashboard() {
  const mt = tasks.filter(t=>t.assignedTo===currentUser.id&&t.status!=="done");
  const ma = alerts.filter(a=>(a.assignedTo===currentUser.id||currentUser.admin)&&a.status!=="done");
  const urgent = mt.filter(t=>t.priority==="urgent");
  const allDone = tasks.filter(t=>t.status==="done").length;
  const allOpen = tasks.filter(t=>t.status!=="done").length;
  const stats = currentUser.admin
    ? `<div class="stat-grid">
        <div class="stat-card"><div class="stat-num" style="color:#C00000">${alerts.filter(a=>a.level==="critical"&&a.status!=="done").length}</div><div class="stat-label">Alertes critiques</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#E87722">${tasks.filter(t=>t.status==="inprogress").length}</div><div class="stat-label">En cours</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#1D7044">${allDone}</div><div class="stat-label">Terminées</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#1B3A6B">${allOpen}</div><div class="stat-label">Restantes</div></div>
       </div>`
    : `<div class="stat-grid">
        <div class="stat-card"><div class="stat-num" style="color:#C00000">${urgent.length}</div><div class="stat-label">Urgentes</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#1B3A6B">${mt.length}</div><div class="stat-label">Mes tâches</div></div>
       </div>`;
  const ms = [...mt].sort((a,b)=>(PO[a.priority]||1)-(PO[b.priority]||1));
  return `${stats}
    ${ma.length>0?`<div class="section-title">Alertes actives</div>${ma.slice(0,3).map(renderAlertCard).join("")}
    ${ma.length>3?`<button class="btn btn-block" onclick="setTab('alerts')">Voir toutes (${ma.length})</button>`:""}`:""} 
    <div class="section-title">Mes tâches prioritaires</div>
    ${ms.length===0?`<div class="empty">✅ Aucune tâche en attente</div>`:ms.slice(0,5).map(t=>renderTaskCard(t)).join("")}
    ${ms.length>5?`<button class="btn btn-block" onclick="setTab('tasks')">Voir toutes (${ms.length})</button>`:""}
    ${activityLog.length>0?`<div class="section-title">Activité récente</div><div class="card" style="padding:8px 12px">
    ${activityLog.slice(0,5).map(l=>`<div class="log-item"><span class="log-time">${l.time}</span><span><b>${l.user}</b> — ${l.msg}</span></div>`).join("")}</div>`:""}`;
}

function renderTasks() {
  let shown = taskFilter==="my" ? tasks.filter(t=>t.assignedTo===currentUser.id) : tasks;
  if (taskCat!=="all") shown = shown.filter(t=>t.category===taskCat);
  const todo = [...shown.filter(t=>t.status!=="done")].sort((a,b)=>(PO[a.priority]||1)-(PO[b.priority]||1));
  const done = shown.filter(t=>t.status==="done");
  return `<div class="tabs">
    <span class="tab ${taskFilter==="my"?"active":""}" onclick="taskFilter='my';render()">Mes tâches</span>
    ${currentUser.admin?`<span class="tab ${taskFilter==="all"?"active":""}" onclick="taskFilter='all';render()">Toutes</span>`:""}
    <span class="tab ${taskCat==="all"?"active":""}" onclick="taskCat='all';render()">Tout</span>
    <span class="tab ${taskCat==="PROPREV"?"active":""}" onclick="taskCat='PROPREV';render()">PROPREV</span>
    <span class="tab ${taskCat==="CFA"?"active":""}" onclick="taskCat='CFA';render()">CFA</span>
  </div>
  ${todo.length===0?`<div class="empty">✅ Aucune tâche ici</div>`:todo.map(t=>renderTaskCard(t,taskFilter==="all")).join("")}
  ${done.length>0?`<div class="section-title">Terminées (${done.length})</div>${done.slice(0,3).map(t=>renderTaskCard(t,true,true)).join("")}`:""}`;
}

function renderAlerts() {
  const active = alerts.filter(a=>a.status!=="done");
  const crit = active.filter(a=>a.level==="critical");
  const imp = active.filter(a=>a.level==="important");
  if (!active.length) return `<div class="empty">✅ Aucune alerte active</div>`;
  return `${crit.length?`<div class="section-title">🔴 Critiques</div>${crit.map(renderAlertCard).join("")}`:""}
    ${imp.length?`<div class="section-title">🟠 Importantes</div>${imp.map(renderAlertCard).join("")}`:""}`;
}

function renderChat() {
  const msgs = chatHistory.length===0
    ? `<div class="msg msg-ai">Bonjour ${currentUser.name} ! Je suis ton assistant PROPREV. Comment puis-je t'aider ?</div>`
    : chatHistory.map(m=>`<div class="msg msg-${m.role==="user"?"user":"ai"}">${m.content.replace(/\n/g,"<br>")}</div>`).join("");
  return `<div class="chat-wrap">
    <div class="chat-messages" id="chat-msgs">${msgs}</div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chat-in" placeholder="Pose ta question..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>
      <button class="btn btn-primary" onclick="sendChat()">Envoyer</button>
    </div>
  </div>`;
}

function renderAdmin() {
  return `<div>
    <div class="section-title">Dispatcher une tâche</div>
    ${dispatchMsg?`<div class="success-msg">${dispatchMsg}</div>`:""}
    <div class="card">
      <div class="form-group"><label class="form-label">Titre *</label><input class="form-input" id="d-title" placeholder="Ex: Préparer convention EXA SIGNAL"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Assigné à *</label><select class="form-input" id="d-assign">
          ${Object.values(USERS).filter(u=>!u.admin).map(u=>`<option value="${u.id}">${u.name}</option>`).join("")}
        </select></div>
        <div class="form-group"><label class="form-label">Priorité *</label><select class="form-input" id="d-prio">
          <option value="urgent">🔴 Urgent</option><option value="important">🟠 Important</option><option value="normal">🟢 Normal</option>
        </select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Catégorie</label><select class="form-input" id="d-cat"><option value="PROPREV">PROPREV</option><option value="CFA">CFA</option></select></div>
        <div class="form-group"><label class="form-label">Client</label><input class="form-input" id="d-client" placeholder="Nom client"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Échéance</label><input class="form-input" id="d-deadline" placeholder="JJ/MM/AAAA"></div>
        <div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="d-notes" placeholder="Contexte"></div>
      </div>
      <div class="form-group"><label class="form-label">Procédure</label><textarea class="form-input" id="d-proc" placeholder="1. Étape 1&#10;2. Étape 2"></textarea></div>
      <button class="btn btn-orange btn-block" onclick="dispatchTask()">Dispatcher →</button>
    </div>
    <div class="section-title">Vue équipe</div>
    ${Object.values(USERS).filter(u=>u.id!=="emir").map(u=>{
      const ut = tasks.filter(t=>t.assignedTo===u.id&&t.status!=="done");
      const urg = ut.filter(t=>t.priority==="urgent").length;
      return `<div class="team-row">${avatarHTML(u,38)}
        <div style="flex:1"><div style="font-size:14px;font-weight:600">${u.name}</div><div style="font-size:11px;color:#666">${u.role}</div></div>
        <div style="text-align:right"><div style="font-size:22px;font-weight:700;color:${urg>0?"#C00000":"#1B3A6B"}">${ut.length}</div><div style="font-size:10px;color:#999">tâches</div></div>
      </div>`;
    }).join("")}
    ${activityLog.length>0?`<div class="section-title">Journal</div><div class="card" style="padding:8px 12px">
    ${activityLog.slice(0,10).map(l=>`<div class="log-item"><span class="log-time">${l.time}</span><span><b>${l.user}</b> — ${l.msg}</span></div>`).join("")}</div>`:""}
  </div>`;
}

function renderPassation() {
  return `<div>
    <div style="background:#FFF8F4;border:1px solid #FFCC99;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;color:#884000">
      <strong>⚠️ Règle d'or :</strong> Je remplis AVANT de partir. L'autre lit EN ARRIVANT.
    </div>
    ${["aya","basma","hajar"].includes(currentUser.id)?`<div class="card">
      <div class="form-group"><label class="form-label">Transmis par</label>
        <select class="form-input" id="p-from">
          ${["aya","basma","hajar"].map(s=>`<option value="${s}" ${s===currentUser.id?"selected":""}>${USERS[s]?.name}</option>`).join("")}
        </select></div>
      <div class="form-group"><label class="form-label">Info / Tâche à transmettre *</label>
        <textarea class="form-input" id="p-info" placeholder="Ce que tu as fait, ce qui reste, ce qui bloque..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Dossier</label><input class="form-input" id="p-dossier" placeholder="Ex: FIVE PIZZA"></div>
        <div class="form-group"><label class="form-label">Urgent ?</label><select class="form-input" id="p-urgent"><option value="non">Non</option><option value="oui">🔴 OUI</option></select></div>
      </div>
      <button class="btn btn-orange btn-block" onclick="addPassation()">Enregistrer →</button>
    </div>`:
    `<p style="font-size:13px;color:#666;margin-bottom:12px">Consultation (secrétaires uniquement pour écrire)</p>`}
    <div class="section-title">Passations récentes</div>
    <div id="passation-list"><div style="text-align:center;padding:20px;color:#666">Chargement...</div></div>
  </div>`;
}

// Actions
async function login(uid) {
  currentUser = USERS[uid];
  chatHistory = [];
  currentTab = "dashboard";
  taskFilter = "my";
  taskCat = "all";
  await addLogDB(`${currentUser.name} s'est connecté(e)`);
  subscribeFirestore();
  render();
  if (currentTab==="passation") loadPassations();
}

function logout() {
  if (unsubTasks) unsubTasks();
  if (unsubAlerts) unsubAlerts();
  currentUser = null;
  chatHistory = [];
  render();
}

function setTab(tab) { currentTab=tab; render(); if(tab==="chat")setTimeout(scrollChat,100); if(tab==="passation")loadPassations(); }
function toggleProc(id) { document.getElementById("pb-"+id)?.classList.toggle("open"); }

async function chStatus(taskId, status) {
  const task = tasks.find(t=>t.id===taskId);
  if (!task) return;
  await updateTaskDB(taskId, {status});
  await addLogDB(`${currentUser.name} → ${task.title.slice(0,40)}: ${status}`);
}

async function resolveAlert(id) {
  const a = alerts.find(x=>x.id===id);
  await updateAlertDB(id, {status:"done"});
  await addLogDB(`${currentUser.name} a résolu: ${a?.problem||""}`);
}

async function dispatchTask() {
  const title = document.getElementById("d-title")?.value.trim();
  if (!title) return;
  const task = {
    title, assignedTo:document.getElementById("d-assign")?.value,
    priority:document.getElementById("d-prio")?.value,
    category:document.getElementById("d-cat")?.value,
    client:document.getElementById("d-client")?.value||"",
    deadline:document.getElementById("d-deadline")?.value||"",
    notes:document.getElementById("d-notes")?.value||"",
    procedure:document.getElementById("d-proc")?.value||"",
    validatedByEmir:true
  };
  await addTaskDB(task);
  await addLogDB(`Emir a assigné "${title}" à ${USERS[task.assignedTo]?.name}`);
  dispatchMsg = `✅ Tâche assignée à ${USERS[task.assignedTo]?.name} !`;
  ["d-title","d-client","d-deadline","d-notes","d-proc"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  render();
  setTimeout(()=>{dispatchMsg="";render();},4000);
}

async function sendChat() {
  const inp = document.getElementById("chat-in");
  if (!inp||!inp.value.trim()) return;
  const msg = inp.value.trim();
  inp.value = "";
  chatHistory.push({role:"user",content:msg});
  render();
  scrollChat();
  const el = document.getElementById("chat-msgs");
  if (el) { const t=document.createElement("div"); t.className="msg msg-thinking"; t.textContent="Réflexion..."; el.appendChild(t); el.scrollTop=el.scrollHeight; }
  try {
    const resp = await callClaude(msg);
    chatHistory.push({role:"assistant",content:resp});
  } catch(e) {
    chatHistory.push({role:"assistant",content:"Erreur de connexion Claude. Réessaie."});
  }
  render(); scrollChat();
}

function scrollChat() { const el=document.getElementById("chat-msgs"); if(el)el.scrollTop=el.scrollHeight; }

async function addPassation() {
  const info = document.getElementById("p-info")?.value.trim();
  if (!info) return;
  const p = {
    from: USERS[document.getElementById("p-from")?.value]?.name||"",
    info, dossier:document.getElementById("p-dossier")?.value||"",
    urgent:document.getElementById("p-urgent")?.value==="oui",
    time: new Date().toLocaleString("fr-FR",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit"}),
    status:"en attente"
  };
  if (db) { try { await db.collection("passations").add({...p,createdAt:firebase.firestore.FieldValue.serverTimestamp()}); } catch(e) {} }
  document.getElementById("p-info").value="";
  document.getElementById("p-dossier").value="";
  await addLogDB(`${currentUser.name} a ajouté une passation`);
  loadPassations();
}

async function loadPassations() {
  const el = document.getElementById("passation-list");
  if (!el) return;
  if (!db) { el.innerHTML=`<div class="empty">Connexion requise</div>`; return; }
  try {
    const snap = await db.collection("passations").orderBy("createdAt","desc").limit(10).get();
    if (snap.empty) { el.innerHTML=`<div class="empty">Aucune passation</div>`; return; }
    el.innerHTML = snap.docs.map(d=>{
      const p=d.data();
      return `<div class="passation-card">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-weight:600;font-size:13px">${p.from}</span>
          <span style="font-size:11px;color:#777">${p.time}</span>
        </div>
        ${p.urgent?`<span class="badge b-urgent" style="margin-bottom:6px">🔴 URGENT</span>`:""}
        <div style="font-size:13px">${p.info}</div>
        ${p.dossier?`<div style="font-size:11px;color:#666;margin-top:4px">Dossier: ${p.dossier}</div>`:""}
      </div>`;
    }).join("");
  } catch(e) { el.innerHTML=`<div class="empty">Erreur chargement</div>`; }
}

// Main render
function render() {
  const app = document.getElementById("app");
  if (!app) return;
  if (!currentUser) { app.innerHTML=`<div class="app">${renderLogin()}</div>`; return; }
  const alertCount = alerts.filter(a=>(a.assignedTo===currentUser.id||currentUser.admin)&&a.status!=="done").length;
  const navItems = [
    {id:"dashboard",icon:"⌂",label:"Accueil"},
    {id:"tasks",icon:"✓",label:"Tâches"},
    {id:"alerts",icon:"!",label:"Alertes"+(alertCount?` (${alertCount})`:"")},
    {id:"chat",icon:"✦",label:"Claude"},
    {id:"passation",icon:"↔",label:"Passation"},
    ...(currentUser.admin?[{id:"admin",icon:"⚙",label:"Admin"}]:[]),
  ];
  const pages = {dashboard:renderDashboard,tasks:renderTasks,alerts:renderAlerts,chat:renderChat,admin:renderAdmin,passation:renderPassation};
  const content = (pages[currentTab]||renderDashboard)();
  const fbBadge = fbStatus==="ok"?`<span class="firebase-status fb-ok">● Base OK</span>`:fbStatus==="error"?`<span class="firebase-status fb-err">● Hors ligne</span>`:`<span class="firebase-status fb-loading">● Connexion...</span>`;
  app.innerHTML = `<div class="app">
    <div class="header">
      <div class="header-brand">PROPREV <span>●</span>${fbBadge}</div>
      <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px 5px 6px;cursor:pointer" onclick="logout()">
        ${avatarHTML(currentUser,26)}
        <span style="font-size:13px">${currentUser.name}</span>
        <span style="opacity:.6;font-size:12px">↩</span>
      </div>
    </div>
    <div class="nav">
      ${navItems.map(n=>`<button class="nav-btn ${currentTab===n.id?"active":""}" onclick="setTab('${n.id}')">
        <span class="nav-icon">${n.icon}</span><span>${n.label}</span>
      </button>`).join("")}
    </div>
    <div class="content">${content}</div>
  </div>`;
  if (currentTab==="chat") scrollChat();
}

// Start
window.login=login; window.logout=logout; window.setTab=setTab;
window.toggleProc=toggleProc; window.chStatus=chStatus;
window.resolveAlert=resolveAlert; window.dispatchTask=dispatchTask;
window.sendChat=sendChat; window.addPassation=addPassation;

// Show login immediately, then init Firebase data
render();
initFirestoreData().catch(e=>console.error("Init error:",e));
</script>
</body>
</html>
