body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--blue);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-brand{font-size:15px;font-weight:600}
.header-brand span{color:var(--orange)}
.nav{display:flex;background:#152e56;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-btn{flex:1;padding:8px 4px 6px;color:rgba(255,255,255,.55);font-size:10px;text-align:center;cursor:pointer;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:50px;white-space:nowrap}
.nav-btn.active{color:var(--orange);border-bottom:2px solid var(--orange)}
.nav-icon{font-size:16px}
.content{flex:1;padding:12px;max-width:650px;margin:0 auto;width:100%}
.login-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:30px 16px}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:380px}
.user-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 10px;cursor:pointer;text-align:center;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.user-card:hover{border-color:var(--blue);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.user-card.admin-card{border-color:var(--orange);background:#FFF8F4}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-urgent{background:#FDECEA;color:#C00000}.b-important{background:#FEF0E6;color:#884000}.b-normal{background:#EBF5E8;color:#2E6B1A}
.b-proprev{background:#E3EEF9;color:#0D3D7C}.b-cfa{background:#EEF0FE;color:#3830A8}.b-todo{background:#F0F0F0;color:#555}
.b-inprogress{background:#FEF0E6;color:#884000}.b-done{background:#EBF5E8;color:#2E6B1A}.b-blocked{background:#FDECEA;color:#C00000}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;border-left:4px solid var(--border)}
.task-card.urgent{border-left-color:var(--red)}.task-card.important{border-left-color:var(--orange)}.task-card.normal{border-left-color:var(--green)}
.task-title{font-size:13px;font-weight:600;margin:6px 0 4px}.task-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.task-client{font-weight:600;color:var(--blue)}.task-notes{font-size:11px;color:var(--muted);font-style:italic;margin:2px 0}
.procedure-box{background:#F8F9FA;border-radius:8px;padding:10px;font-size:12px;color:#444;white-space:pre-line;line-height:1.7;display:none;margin-top:8px;border-left:3px solid var(--blue)}
.procedure-box.open{display:block}
.task-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.alert-card{border-radius:10px;padding:10px 12px;margin-bottom:8px;border-left:4px solid}
.alert-critical{background:#FDECEA;border-color:#E53935}.alert-important{background:#FEF0E6;border-color:var(--orange)}
.alert-title{font-size:13px;font-weight:600;margin-bottom:2px}.alert-detail{font-size:11px;color:var(--muted)}
.alert-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.btn{border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;background:var(--card);color:var(--text);font-family:inherit;transition:.15s}
.btn:hover{background:#F0F0F0}.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-orange{background:var(--orange);color:#fff;border-color:var(--orange)}.btn-green{background:var(--green);color:#fff;border-color:var(--green)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}.btn-sm{padding:4px 10px;font-size:11px}
.btn-block{width:100%;display:block;text-align:center;margin-top:8px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:26px;font-weight:700}.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 190px);min-height:350px}
.chat-messages{flex:1;overflow-y:auto;padding-bottom:10px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.6}
.msg-user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-ai{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg-thinking{color:var(--muted);font-style:italic;font-size:12px;align-self:flex-start}
.chat-input-row{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--border);margin-top:8px}
.chat-input{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;resize:none;height:44px;font-family:inherit}
.form-group{margin-bottom:10px}.form-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:3px;display:block}
.form-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text)}
.form-input:focus{outline:none;border-color:var(--blue)}
select.form-input{cursor:pointer}textarea.form-input{resize:vertical;min-height:70px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:500}
.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.log-time{min-width:40px;color:#999}

.empty{text-align:center;padding:30px 16px;color:var(--muted)}

.error-msg{background:#FDECEA;color:#C00000;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:10px}

@media print{

  .print-only{display:block!important}

.doc-preview table td{padding:5px 8px;border:1px solid #ccc;font-size:11px}

.doc-preview .sig-box{border:1px solid #ccc;flex:1;min-height:80px;padding:8px;font-size:10px}
.doc-preview .proprev-header{text-align:center;margin-bottom:16px;border-bottom:3px solid var(--blue);padding-bottom:10px}

.doc-preview .total-row{background:#1B3A6B;color:white;font-weight:700}

async function initDB(){
  try{const s=await db.collection("tasks").limit(1).get();if(s.empty){const b=db.batch();INIT_TASKS.forEach(t=>b.set(db.collection("tasks").doc(t.id),t));INIT_ALERTS.forEach(a=>b.set(db.collection("alerts").doc(a.id),a));await b.commit();}}catch(e){}
}
function subscribeDB(){
  db.collection("tasks").onSnapshot(s=>{if(!s.empty){tasks=s.docs.map(d=>({...d.data(),id:d.id}));render();}},e=>{});
  db.collection("alerts").onSnapshot(s=>{if(!s.empty){alerts=s.docs.map(d=>({...d.data(),id:d.id}));render();}},e=>{});
  db.collection("activity_log").orderBy("createdAt","desc").limit(20).onSnapshot(s=>{if(!s.empty)activityLog=s.docs.map(d=>d.data());},e=>{});
}
async function updateTask(id,data){tasks=tasks.map(t=>t.id===id?{...t,...data}:t);try{await db.collection("tasks").doc(id).update(data);}catch(e){}render();}
async function addTaskToDB(task){const id="t"+Date.now();const t={...task,id,createdAt:new Date().toISOString(),status:"todo"};tasks=[t,...tasks];try{await db.collection("tasks").doc(id).set(t);}catch(e){}render();}
async function updateAlert(id,data){alerts=alerts.map(a=>a.id===id?{...a,...data}:a);try{await db.collection("alerts").doc(id).update(data);}catch(e){}render();}
async function addLog(msg){const e={time:new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),msg,user:currentUser?.name||"Système"};activityLog=[e,...activityLog.slice(0,49)];try{await db.collection("activity_log").add({...e,createdAt:firebase.firestore.FieldValue.serverTimestamp()});}catch(ex){}}

function fillClientFields(selectId){
  const val=document.getElementById(selectId)?.value;
  if(!val||val==="autre")return;
  const c=getClient(val);
  if(!c)return;
  const set=(id,v)=>{const el=document.getElementById(id);if(el&&v)el.value=v;};
  set("d-client",c.nom);set("d-siret",c.siret||"");set("d-contact",c.contact||"");
  set("d-fonction",c.fonction||"");set("d-adresse",c.adresse||"");
  set("d-opco",c.opco||"");
}

function fillFormationFields(selectId){
  const val=document.getElementById(selectId)?.value;
  if(!val||val==="autre")return;
  const f=FORMATIONS_CAT.find(x=>x.id===val);
  if(!f)return;
  const set=(id,v)=>{const el=document.getElementById(id);if(el&&v!==undefined)el.value=v;};
  set("d-formation",f.label);
  if(f.duree)set("d-duree",f.duree);
  if(f.prixIntra)set("d-tarif",Math.round(f.prixIntra/f.duree)||24);
  if(f.prixInter)set("d-tarif-inter",f.prixInter);
}

// ═══ STAGIAIRES ROWS ═══
function renderStagiaireRows(){
  return docStagiaires.map((s,i)=>`<div class="stag-row">
    <input class="form-input" placeholder="NOM" value="${s.nom}" onchange="docStagiaires[${i}].nom=this.value.toUpperCase();this.value=this.value.toUpperCase()">
    <input class="form-input" placeholder="Prénom" value="${s.prenom}" onchange="docStagiaires[${i}].prenom=this.value">
    <button class="btn btn-sm btn-red" onclick="removeStagRow(${i})" style="padding:4px 8px">✕</button>
  </div>`).join("");
}
function addStagRow(){docStagiaires.push({nom:"",prenom:""});document.getElementById("stag-list").innerHTML=renderStagiaireRows();}
function removeStagRow(i){if(docStagiaires.length>1)docStagiaires.splice(i,1);document.getElementById("stag-list").innerHTML=renderStagiaireRows();}
function importStagCSV(){
  const txt=prompt("Colle la liste des stagiaires (format: NOM Prénom, une par ligne)");
  if(!txt)return;
  const lines=txt.split("\n").filter(l=>l.trim());
  lines.forEach(l=>{
    const parts=l.trim().split(" ");
    docStagiaires.push({nom:parts[0]||"",prenom:parts.slice(1).join(" ")||""});
  });
  document.getElementById("stag-list").innerHTML=renderStagiaireRows();
}

function renderTaskCard(t,showA=false,done=false){
  const u=USERS[t.assignedTo]||{name:t.assignedTo,color:"#888"};
  const isOwn=currentUser&&(t.assignedTo===currentUser.id||currentUser.admin);
  return`<div class="task-card ${done?"":t.priority}">
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">
      ${pBadge(t.priority)}<span class="badge b-${(t.category||"proprev").toLowerCase()}">${t.category}</span>${sBadge(t.status)}
    </div>
    <div class="task-title">${t.title}</div>
    <div class="task-meta"><span class="task-client">${t.client||""}</span>${t.deadline?`<span>→ ${t.deadline}</span>`:""} ${showA?`<span>${u.name}</span>`:""}</div>
    ${t.notes?`<div class="task-notes">${t.notes}</div>`:""}
    ${t.procedure?`<button class="btn btn-sm" onclick="toggleProc('${t.id}')" style="margin-top:4px">📋 Procédure</button><div class="procedure-box" id="pb-${t.id}">${t.procedure}</div>`:""}
    ${isOwn&&!done?`<div class="task-actions">
      ${t.status==="todo"?`<button class="btn btn-sm btn-primary" onclick="chStatus('${t.id}','inprogress')">Démarrer</button>`:""}
      ${t.status==="inprogress"?`<button class="btn btn-sm btn-green" onclick="chStatus('${t.id}','done')">Terminé ✓</button>`:""}
      ${t.status!=="blocked"?`<button class="btn btn-sm" style="color:#C00000;border-color:#C00000" onclick="chStatus('${t.id}','blocked')">Bloqué</button>`:""}
      ${t.status==="blocked"?`<button class="btn btn-sm" onclick="chStatus('${t.id}','todo')">Débloquer</button>`:""}
    </div>`:""}
  </div>`;
}

function renderAlertCard(a){
  if(a.status==="done")return"";
  const isOwn=currentUser&&(a.assignedTo===currentUser.id||currentUser.admin);
  return`<div class="alert-card ${a.level==="critical"?"alert-critical":"alert-important"}">
    <div class="alert-title">${a.level==="critical"?"🔴":"🟠"} ${a.client} — ${a.problem}</div>
    <div class="alert-detail">${a.detail}</div>
    <div class="alert-footer"><span style="font-size:10px;color:#777">→ ${USERS[a.assignedTo]?.name} · ${a.deadline}</span>
    ${isOwn?`<button class="btn btn-sm" onclick="resolveAlert('${a.id}')">Résolu ✓</button>`:""}</div>
  </div>`;
}

function renderDashboard(){
  const mt=tasks.filter(t=>t.assignedTo===currentUser.id&&t.status!=="done");
  const ma=alerts.filter(a=>(a.assignedTo===currentUser.id||currentUser.admin)&&a.status!=="done");
  const ms=[...mt].sort((a,b)=>(PO[a.priority]||1)-(PO[b.priority]||1));
  const caTotal=sessions.filter(s=>s.statut==="termine").reduce((s,x)=>s+(x.montantHT||0),0);
  const stats=currentUser.admin
    ?`<div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="color:#C00000">${alerts.filter(a=>a.level==="critical"&&a.status!=="done").length}</div><div class="stat-label">Alertes critiques</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#E87722">${tasks.filter(t=>t.status==="inprogress").length}</div><div class="stat-label">En cours</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#1D7044">${tasks.filter(t=>t.status==="done").length}</div><div class="stat-label">Terminées</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#1B3A6B">${tasks.filter(t=>t.status!=="done").length}</div><div class="stat-label">Restantes</div></div>
    </div>
    <div class="card" style="background:linear-gradient(135deg,#1B3A6B,#2a5298);color:white;margin-bottom:10px">
      <div style="font-size:11px;opacity:.8">CA sessions identifié</div>
      <div style="font-size:24px;font-weight:700">${caTotal.toLocaleString("fr-FR")} €</div>
      <div style="font-size:11px;opacity:.7">${sessions.filter(s=>s.statut==="termine").length} sessions terminées · ${sessions.filter(s=>s.statut==="planifie").length} planifiées</div>
    </div>`
    :`<div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="color:#C00000">${mt.filter(t=>t.priority==="urgent").length}</div><div class="stat-label">Urgentes</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#1B3A6B">${mt.length}</div><div class="stat-label">Mes tâches</div></div>
    </div>`;
  return`${stats}
    ${ma.length>0?`<div class="section-title">Alertes actives</div>${ma.slice(0,3).map(renderAlertCard).join("")}${ma.length>3?`<button class="btn btn-block" onclick="setTab('alerts')">Voir toutes (${ma.length})</button>`:""}`:""}
    <div class="section-title">Mes tâches prioritaires</div>
    ${ms.length===0?`<div class="empty">✅ Aucune tâche en attente</div>`:ms.slice(0,5).map(t=>renderTaskCard(t)).join("")}
    ${ms.length>5?`<button class="btn btn-block" onclick="setTab('tasks')">Voir toutes (${ms.length})</button>`:""}
    ${activityLog.length>0?`<div class="section-title">Activité récente</div><div class="card" style="padding:8px 12px">${activityLog.slice(0,4).map(l=>`<div class="log-item"><span class="log-time">${l.time}</span><span><b>${l.user}</b> — ${l.msg}</span></div>`).join("")}</div>`:""}`;
}

function renderTasks(){
  let shown=taskFilter==="my"?tasks.filter(t=>t.assignedTo===currentUser.id):tasks;
  if(taskCat!=="all")shown=shown.filter(t=>t.category===taskCat);
  const todo=[...shown.filter(t=>t.status!=="done")].sort((a,b)=>(PO[a.priority]||1)-(PO[b.priority]||1));
  const done=shown.filter(t=>t.status==="done");
  return`<div class="tabs">
    <span class="tab ${taskFilter==="my"?"active":""}" onclick="taskFilter='my';render()">Mes tâches</span>
    ${currentUser.admin?`<span class="tab ${taskFilter==="all"?"active":""}" onclick="taskFilter='all';render()">Toutes</span>`:""}
    <span class="tab ${taskCat==="all"?"active":""}" onclick="taskCat='all';render()">Tout</span>
    <span class="tab ${taskCat==="PROPREV"?"active":""}" onclick="taskCat='PROPREV';render()">PROPREV</span>
    <span class="tab ${taskCat==="CFA"?"active":""}" onclick="taskCat='CFA';render()">CFA</span>
  </div>
  ${todo.length===0?`<div class="empty">✅ Aucune tâche ici</div>`:todo.map(t=>renderTaskCard(t,taskFilter==="all")).join("")}
  ${done.length>0?`<div class="section-title">Terminées (${done.length})</div>${done.slice(0,3).map(t=>renderTaskCard(t,true,true)).join("")}`:""}`;
}

function renderAlerts(){
  const active=alerts.filter(a=>a.status!=="done");
  if(!active.length)return`<div class="empty">✅ Aucune alerte active</div>`;
  const crit=active.filter(a=>a.level==="critical"),imp=active.filter(a=>a.level==="important");
  return`${crit.length?`<div class="section-title">🔴 Critiques</div>${crit.map(renderAlertCard).join("")}`:""}
    ${imp.length?`<div class="section-title">🟠 Importantes</div>${imp.map(renderAlertCard).join("")}`:""}`;
}

async function resolveAlert(id){const a=alerts.find(x=>x.id===id);await updateAlert(id,{status:"done"});await addLog(`${currentUser.name} a résolu: ${a?.problem||""}`);}
async function dispatchTask(){
  const title=document.getElementById("d-title")?.value.trim();
  if(!title)return;
  const task={title,assignedTo:document.getElementById("d-assign")?.value,priority:document.getElementById("d-prio")?.value,category:document.getElementById("d-cat")?.value,client:document.getElementById("d-client-admin")?.value||"",deadline:document.getElementById("d-deadline")?.value||"",notes:document.getElementById("d-notes")?.value||"",procedure:document.getElementById("d-proc")?.value||""};
  await addTaskToDB(task);
  await addLog(`Emir a assigné "${title}" à ${USERS[task.assignedTo]?.name}`);
  dispatchMsg=`✅ Assigné à ${USERS[task.assignedTo]?.name} !`;
  ["d-title","d-client-admin","d-deadline","d-notes","d-proc"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  render();
  setTimeout(()=>{dispatchMsg="";render();},3000);
}
async function sendChat(){
  const inp=document.getElementById("chat-in");
  if(!inp||!inp.value.trim())return;
  const msg=inp.value.trim();inp.value="";
  chatHistory.push({role:"user",content:msg});render();scrollChat();
  const el=document.getElementById("chat-msgs");
  if(el){const t=document.createElement("div");t.className="msg msg-thinking";t.textContent="Réflexion...";el.appendChild(t);el.scrollTop=el.scrollHeight;}
  try{const r=await callClaude(msg);chatHistory.push({role:"assistant",content:r});}
  catch(e){chatHistory.push({role:"assistant",content:"Erreur de connexion. Réessaie."});}
  render();scrollChat();
}
function scrollChat(){const el=document.getElementById("chat-msgs");if(el)el.scrollTop=el.scrollHeight;}
async function addPassation(){
  const info=document.getElementById("p-info")?.value.trim();if(!info)return;
  const p={from:USERS[document.getElementById("p-from")?.value]?.name||"",info,dossier:document.getElementById("p-dossier")?.value||"",urgent:document.getElementById("p-urgent")?.value==="oui",time:new Date().toLocaleString("fr-FR",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit"})};
  try{await db.collection("passations").add({...p,createdAt:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}
  document.getElementById("p-info").value="";
  await addLog(`${currentUser.name} a ajouté une passation`);
  loadPassations();
}
async function loadPassations(){
  const el=document.getElementById("passation-list");if(!el)return;
  try{
    const s=await db.collection("passations").orderBy("createdAt","desc").limit(10).get();
    if(s.empty){el.innerHTML=`<div class="empty">Aucune passation</div>`;return;}
    el.innerHTML=s.docs.map(d=>{const p=d.data();return`<div class="passation-card"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:600;font-size:13px">${p.from}</span><span style="font-size:10px;color:#777">${p.time}</span></div>${p.urgent?`<span class="badge b-urgent">🔴 URGENT</span><br>`:""}${p.info}${p.dossier?`<div style="font-size:10px;color:#666;margin-top:3px">Dossier: ${p.dossier}</div>`:""}</div>`;}).join("");
  }catch(e){el.innerHTML=`<div class="empty">Erreur chargement</div>`;}
}

// ═══ MAIN RENDER ═══
function render(){
  const app=document.getElementById("app");if(!app)return;
  if(!currentUser){app.innerHTML=`<div class="app">${renderLogin()}</div>`;return;}
  const alertCount=alerts.filter(a=>(a.assignedTo===currentUser.id||currentUser.admin)&&a.status!=="done").length;
  const navItems=[
    {id:"dashboard",icon:"⌂",label:"Accueil"},
    {id:"tasks",icon:"✓",label:"Tâches"},
    {id:"alerts",icon:"!",label:alertCount?`Alertes(${alertCount})`:"Alertes"},
    {id:"docs",icon:"📄",label:"Documents"},
    {id:"clients",icon:"🏢",label:"Clients"},
    {id:"sessions",icon:"📅",label:"Sessions"},
    {id:"formations",icon:"📚",label:"Formations"},
    {id:"passwords",icon:"🔑",label:"OPCO"},
    {id:"formateurs",icon:"👨‍🏫",label:"Formateurs"},
    {id:"chat",icon:"✦",label:"Claude"},
    {id:"passation",icon:"↔",label:"Passation"},
    ...(currentUser.admin?[{id:"admin",icon:"⚙",label:"Admin"}]:[]),
  ];
  const pages={dashboard:renderDashboard,tasks:renderTasks,alerts:renderAlerts,docs:renderDocs,clients:renderClients,sessions:renderSessions,formations:renderFormations,passwords:renderPasswords,formateurs:renderFormateurs,chat:renderChat,admin:renderAdmin,passation:renderPassation};
  const content=(pages[currentTab]||renderDashboard)();
  app.innerHTML=`<div class="app">
    <div class="header no-print">
      <div class="header-brand">PROPREV <span>●</span><span class="fb-badge fb-ok">Base OK</span></div>
      <div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 10px 4px 5px;cursor:pointer" onclick="logout()">
        ${av(currentUser,24)}<span style="font-size:12px">${currentUser.name}</span><span style="opacity:.6;font-size:11px">↩</span>
      </div>
    </div>
    <div class="nav no-print">${navItems.map(n=>`<button class="nav-btn ${currentTab===n.id?"active":""}" onclick="setTab('${n.id}')"><span class="nav-icon">${n.icon}</span><span>${n.label}</span></button>`).join("")}</div>
    <div class="content">${content}</div>
  </div>`;
  if(currentTab==="chat")scrollChat();
}

// ═══ EXPOSE ═══
window.login=login;window.logout=logout;window.setTab=setTab;
window.toggleProc=toggleProc;window.chStatus=chStatus;
window.resolveAlert=resolveAlert;window.dispatchTask=dispatchTask;
window.sendChat=sendChat;window.addPassation=addPassation;
window.showDoc=showDoc;window.genDoc=genDoc;
window.togglePwd=togglePwd;window.copyTxt=copyTxt;
window.addFormateur=addFormateur;window.addStagRow=addStagRow;
window.removeStagRow=removeStagRow;window.importStagCSV=importStagCSV;
window.fillClientFields=fillClientFields;window.fillFormationFields=fillFormationFields;
window.genContratST=genContratST;window.startDoc=startDoc;
window.addSession=addSession;window.showNewSession=showNewSession;

render();
initDB().catch(e=>console.error(e));
</script>
